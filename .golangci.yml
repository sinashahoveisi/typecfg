# golangci-lint config for the typecfg workspace.
#
# Run per module (not once from the repo root): go.work lists several
# independent modules (sources, jsonschema, consul, etcd, otel, …). A
# single `golangci-lint run ./...` at the root only analyzes the root
# module. From the repo root:
#
#   for m in . sources jsonschema consul etcd otel; do
#     (cd "$m" && golangci-lint run ./...)
#   done
#
# cmd/typecfg-gen is part of the root module (no separate go.mod).
# benchmarks/ is intentionally excluded (no exported public API).

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - revive
    - staticcheck
    - unused
    - ineffassign

linters-settings:
  revive:
    rules:
      - name: exported
        severity: error
        disabled: false
        arguments:
          - checkPrivateReceivers
          - disableStutteringCheck
          - checkPublicInterface
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unreachable-code
      - name: redefines-builtin-id

issues:
  # golangci-lint's default exclude set suppresses revive "exported should have
  # comment" findings; turn that off so missing godoc is actually reported.
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - benchmarks
  exclude-rules:
    # Generated binders: regenerated by typecfg-gen; do not hand-edit docs.
    - path: _gen\.go$
      linters: [revive]
    # Test helpers and fixtures need less ceremony than public API.
    - path: _test\.go$
      linters: [revive]
      text: "exported (method|function|type|const|var|field)|redefines-builtin-id|stutters|should have comment"
    # examples/ is a demo binary, not library API surface.
    - path: examples/
      linters: [revive]
      text: "exported|stutters|should have comment"
    # Intentional names mirroring the backend (consul.ConsulSource, etcd.EtcdSource).
    - text: "stutters; consider calling this Source"
      linters: [revive]
